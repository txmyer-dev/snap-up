<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SNAP Status</title>
  <style>
    @font-face {
      font-family: 'Inter';
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src: url('/fonts/inter-regular.woff2') format('woff2');
    }
    @font-face {
      font-family: 'Inter';
      font-style: normal;
      font-weight: 500;
      font-display: swap;
      src: url('/fonts/inter-medium.woff2') format('woff2');
    }
    @font-face {
      font-family: 'Inter';
      font-style: normal;
      font-weight: 600;
      font-display: swap;
      src: url('/fonts/inter-semibold.woff2') format('woff2');
    }

    /* shadcn dark theme tokens */
    :root {
      --background: 222.2 84% 4.9%;
      --foreground: 210 40% 98%;
      --card: 222.2 84% 4.9%;
      --card-foreground: 210 40% 98%;
      --muted: 217.2 32.6% 17.5%;
      --muted-foreground: 215 20.2% 65.1%;
      --border: 217.2 32.6% 17.5%;
      --accent: 217.2 32.6% 17.5%;
      --accent-foreground: 210 40% 98%;
      --ring: 212.7 26.8% 83.9%;
      --radius: 0.75rem;

      --bg: hsl(222.2, 84%, 4.9%);
      --surface: hsl(222.2, 47%, 11.2%);
      --border-color: hsl(217.2, 32.6%, 17.5%);
      --text: hsl(210, 40%, 98%);
      --text-muted: hsl(215, 20.2%, 65.1%);
      --blue: hsl(217.2, 91.2%, 59.8%);
      --green: hsl(142.1, 76.2%, 36.3%);
      --red: hsl(0, 84.2%, 60.2%);
      --yellow: hsl(47.9, 95.8%, 53.1%);
      --purple: hsl(263.4, 70%, 50.4%);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .container {
      width: 100%;
      max-width: 1280px;
      margin: 0 auto;
      padding: 1.5rem 1rem;
    }

    @media (min-width: 640px) {
      .container { padding: 2rem 1.5rem; }
    }

    @media (min-width: 1024px) {
      .container { padding: 2.5rem 2rem; }
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .header h1 {
      font-size: 1.125rem;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .last-updated {
      font-size: 0.75rem;
      color: var(--text-muted);
      display: none;
    }

    @media (min-width: 640px) {
      .last-updated { display: inline; }
    }

    .refresh-btn {
      background: var(--surface);
      border: 1px solid var(--border-color);
      color: var(--blue);
      padding: 0.375rem 0.75rem;
      border-radius: calc(var(--radius) - 4px);
      font-size: 0.8125rem;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .refresh-btn:hover {
      background: hsl(217.2, 32.6%, 17.5%);
      border-color: hsl(215, 20.2%, 45%);
    }

    .refresh-btn:focus-visible {
      outline: 2px solid var(--blue);
      outline-offset: 2px;
    }

    .refresh-btn.loading { opacity: 0.5; pointer-events: none; }

    /* Status banner */
    .status-banner {
      background: var(--surface);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .status-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 500;
      margin-bottom: 0.375rem;
    }

    .status-value {
      font-size: 1.375rem;
      font-weight: 600;
    }

    .status-value.ok { color: var(--green); }
    .status-value.warn { color: var(--yellow); }
    .status-value.error { color: var(--red); }

    .status-sub {
      font-size: 0.8125rem;
      color: var(--text-muted);
      margin-top: 0.375rem;
    }

    /* Card grid */
    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1rem;
    }

    @media (min-width: 640px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (min-width: 1024px) {
      .grid { grid-template-columns: repeat(3, 1fr); }
    }

    /* Card (shadcn style) */
    .card {
      background: var(--surface);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      padding: 1.25rem;
      min-width: 0; /* prevent grid blowout */
    }

    .card h2 {
      font-size: 0.8125rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 500;
      margin-bottom: 0.875rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .card h2 .count {
      background: hsl(217.2, 32.6%, 17.5%);
      padding: 0.125rem 0.5rem;
      border-radius: 9999px;
      font-size: 0.6875rem;
      color: var(--text);
      font-weight: 500;
    }

    .fullwidth { grid-column: 1 / -1; }

    /* Task rows */
    .task-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border-color);
      font-size: 0.8125rem;
      gap: 0.75rem;
    }

    .task-row:last-child { border-bottom: none; }

    .task-content {
      color: var(--text);
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    .task-meta {
      font-size: 0.75rem;
      color: var(--text-muted);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .priority-1 { border-left: 3px solid var(--red); padding-left: 0.5rem; }
    .priority-2 { border-left: 3px solid var(--yellow); padding-left: 0.5rem; }
    .priority-3 { border-left: 3px solid var(--blue); padding-left: 0.5rem; }

    .completed-task .task-content {
      color: var(--text-muted);
      text-decoration: line-through;
    }

    .session-task .task-content {
      color: var(--blue);
      text-decoration: none;
    }

    .session-badge {
      font-size: 0.625rem;
      color: var(--bg);
      background: var(--blue);
      padding: 0.0625rem 0.375rem;
      border-radius: 3px;
      margin-left: 0.5rem;
      font-weight: 600;
    }

    /* Stat rows */
    .stat-row {
      display: flex;
      justify-content: space-between;
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border-color);
      font-size: 0.8125rem;
    }

    .stat-row:last-child { border-bottom: none; }
    .stat-label { color: var(--text-muted); }

    .stat-value {
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }

    .stat-value.healthy { color: var(--green); }
    .stat-value.warning { color: var(--yellow); }

    /* GitHub rows */
    .gh-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border-color);
      font-size: 0.8125rem;
      gap: 0.75rem;
    }

    .gh-row:last-child { border-bottom: none; }

    .gh-summary {
      color: var(--text);
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    .gh-time {
      font-size: 0.6875rem;
      color: var(--text-muted);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .gh-type {
      display: inline-block;
      font-size: 0.625rem;
      padding: 0.0625rem 0.375rem;
      border-radius: 4px;
      margin-right: 0.375rem;
      font-weight: 500;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .gh-type-push { background: hsla(217.2, 91.2%, 59.8%, 0.15); color: var(--blue); }
    .gh-type-create { background: hsla(142.1, 76.2%, 36.3%, 0.15); color: var(--green); }
    .gh-type-public { background: hsla(47.9, 95.8%, 53.1%, 0.15); color: var(--yellow); }
    .gh-type-pr { background: hsla(263.4, 70%, 50.4%, 0.15); color: var(--purple); }
    .gh-type-default { background: hsla(215, 20.2%, 65.1%, 0.15); color: var(--text-muted); }

    /* n8n rows */
    .n8n-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border-color);
      font-size: 0.8125rem;
      gap: 0.75rem;
    }

    .n8n-row:last-child { border-bottom: none; }

    .n8n-wf {
      color: var(--text);
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    .n8n-status {
      font-size: 0.6875rem;
      padding: 0.0625rem 0.375rem;
      border-radius: 4px;
      font-weight: 500;
      flex-shrink: 0;
    }

    .n8n-success { background: hsla(142.1, 76.2%, 36.3%, 0.15); color: var(--green); }
    .n8n-error { background: hsla(0, 84.2%, 60.2%, 0.15); color: var(--red); }

    .n8n-summary {
      display: flex;
      gap: 1rem;
      margin-bottom: 0.75rem;
      font-size: 0.8125rem;
    }

    .n8n-summary-item { display: flex; align-items: center; gap: 0.3rem; }

    .n8n-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }

    .n8n-dot-ok { background: var(--green); }
    .n8n-dot-err { background: var(--red); }

    /* Handoff card */
    .handoff-card { border-left: 3px solid var(--blue); }

    .handoff-section { margin-bottom: 0.75rem; }

    .handoff-section-title {
      font-size: 0.75rem;
      color: var(--blue);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.25rem;
      font-weight: 500;
    }

    .handoff-item {
      font-size: 0.8125rem;
      color: var(--text);
      line-height: 1.5;
      padding: 0.125rem 0;
    }

    .handoff-item::before {
      content: "\2192 ";
      color: var(--text-muted);
    }

    /* States */
    .loading-msg {
      color: var(--text-muted);
      text-align: center;
      padding: 1.5rem;
      font-size: 0.8125rem;
    }

    .error-msg {
      color: var(--red);
      text-align: center;
      padding: 1rem;
      font-size: 0.8125rem;
    }

    .empty-state {
      color: var(--text-muted);
      font-size: 0.8125rem;
      text-align: center;
      padding: 1.25rem;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>SNAP Status</h1>
      <div class="header-right">
        <span class="last-updated" id="lastUpdated">Loading...</span>
        <button class="refresh-btn" id="refreshBtn" onclick="refresh()">Refresh</button>
      </div>
    </div>

    <div class="status-banner">
      <div class="status-label">System Status</div>
      <div class="status-value ok" id="systemStatus">Loading...</div>
      <div class="status-sub" id="statusSub"></div>
    </div>

    <div class="grid">
      <div class="card">
        <h2>Due Today <span class="count" id="dueCount">0</span></h2>
        <div id="dueTasks"><div class="loading-msg">Loading...</div></div>
      </div>

      <div class="card">
        <h2>Completed Today <span class="count" id="completedCount">0</span></h2>
        <div id="completedTasks"><div class="loading-msg">Loading...</div></div>
      </div>

      <div class="card">
        <h2>VPS Health</h2>
        <div id="vpsHealth"><div class="loading-msg">Loading...</div></div>
      </div>

      <div class="card">
        <h2>GitHub Activity <span class="count" id="ghCount">0</span></h2>
        <div id="githubActivity"><div class="loading-msg">Loading...</div></div>
      </div>

      <div class="card">
        <h2>n8n Workflows <span class="count" id="n8nCount">0</span></h2>
        <div id="n8nExecs"><div class="loading-msg">Loading...</div></div>
      </div>

      <div class="card">
        <h2>Gmail <span class="count" id="gmailCount">0</span></h2>
        <div id="gmailContent"><div class="loading-msg">Loading...</div></div>
      </div>

      <div class="card">
        <h2>Calendar Today <span class="count" id="calCount">0</span></h2>
        <div id="calendarContent"><div class="loading-msg">Loading...</div></div>
      </div>

      <div class="card handoff-card" id="handoffCard" style="display:none;">
        <h2>Last Session Handoff</h2>
        <div id="handoffContent"></div>
      </div>

      <div class="card fullwidth">
        <h2>System Info</h2>
        <div id="systemInfo"><div class="loading-msg">Loading...</div></div>
      </div>
    </div>
  </div>

  <script>
    var N8N_WEBHOOK = 'https://n8n.felaniam.cloud/webhook/catch-me-up';
    var lastData = null;

    function clearEl(el) { while (el.firstChild) el.removeChild(el.firstChild); }

    function showMsg(el, text, cls) {
      clearEl(el);
      var d = document.createElement('div');
      d.className = cls || 'loading-msg';
      d.textContent = text;
      el.appendChild(d);
    }

    function priorityClass(p) {
      if (p === 4) return 'priority-1';
      if (p === 3) return 'priority-2';
      if (p === 2) return 'priority-3';
      return '';
    }

    function createTaskRow(task, completed) {
      var isSession = completed && task.source === 'session';
      var row = document.createElement('div');
      row.className = 'task-row ' + (isSession ? 'session-task' : (completed ? 'completed-task' : priorityClass(task.priority)));
      var content = document.createElement('span');
      content.className = 'task-content';
      content.textContent = task.content;
      if (isSession) {
        var badge = document.createElement('span');
        badge.className = 'session-badge';
        badge.textContent = 'SHIPPED';
        content.appendChild(badge);
      }
      var meta = document.createElement('span');
      meta.className = 'task-meta';
      meta.textContent = completed ? '' : (task.due || '');
      row.appendChild(content);
      row.appendChild(meta);
      return row;
    }

    function renderTasks(el, tasks, completed) {
      clearEl(el);
      if (!tasks || tasks.length === 0) {
        showMsg(el, completed ? 'Nothing completed yet' : 'All clear!', 'empty-state');
        return;
      }
      tasks.forEach(function(t) { el.appendChild(createTaskRow(t, completed)); });
    }

    function createStatRow(label, value, cls) {
      var row = document.createElement('div');
      row.className = 'stat-row';
      var labelEl = document.createElement('span');
      labelEl.className = 'stat-label';
      labelEl.textContent = label;
      var valEl = document.createElement('span');
      valEl.className = 'stat-value ' + (cls || 'healthy');
      valEl.textContent = value;
      row.appendChild(labelEl);
      row.appendChild(valEl);
      return row;
    }

    function renderVPS(el, vps) {
      clearEl(el);
      if (!vps || vps.error || vps.note) {
        showMsg(el, vps ? (vps.error || vps.note || 'No VPS data') : 'No VPS data', vps && vps.error ? 'error-msg' : 'empty-state');
        return;
      }
      var diskPct = parseInt((vps.disk_usage || '0').replace('%', '')) || 0;
      var memPct = vps.memory_pct || 0;
      var diskLabel = vps.disk_detail ? vps.disk_usage + ' (' + vps.disk_detail + ')' : (vps.disk_usage || 'N/A');
      el.appendChild(createStatRow('Disk', diskLabel, diskPct > 80 ? 'warning' : 'healthy'));
      el.appendChild(createStatRow('Memory', vps.memory || 'N/A', memPct > 80 ? 'warning' : 'healthy'));
      el.appendChild(createStatRow('Load', vps.load && vps.cpu_cores ? vps.load + ' / ' + vps.cpu_cores + ' cores' : 'N/A', parseFloat(vps.load || 0) > vps.cpu_cores ? 'warning' : 'healthy'));
      el.appendChild(createStatRow('Containers', (vps.containers != null ? vps.containers + ' running' : 'N/A'), 'healthy'));
      el.appendChild(createStatRow('Uptime', vps.uptime || 'N/A', 'healthy'));
    }

    function createHandoffSection(title, items) {
      var sec = document.createElement('div');
      sec.className = 'handoff-section';
      var h = document.createElement('div');
      h.className = 'handoff-section-title';
      h.textContent = title;
      sec.appendChild(h);
      items.forEach(function(item) {
        var p = document.createElement('div');
        p.className = 'handoff-item';
        p.textContent = item;
        sec.appendChild(p);
      });
      return sec;
    }

    function ghTypeClass(type) {
      var t = (type || '').toLowerCase();
      if (t === 'push') return 'gh-type-push';
      if (t === 'create') return 'gh-type-create';
      if (t === 'public') return 'gh-type-public';
      if (t === 'pullrequest') return 'gh-type-pr';
      return 'gh-type-default';
    }

    function timeAgo(dateStr) {
      if (!dateStr) return '';
      var diff = (Date.now() - new Date(dateStr).getTime()) / 1000;
      if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
      if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
      return Math.floor(diff / 86400) + 'd ago';
    }

    function renderGitHub(el, events) {
      clearEl(el);
      if (!events || events.length === 0) {
        showMsg(el, 'No recent activity', 'empty-state');
        return;
      }
      events.forEach(function(ev) {
        var row = document.createElement('div');
        row.className = 'gh-row';
        var left = document.createElement('span');
        left.className = 'gh-summary';
        var badge = document.createElement('span');
        badge.className = 'gh-type ' + ghTypeClass(ev.type);
        badge.textContent = ev.type;
        left.appendChild(badge);
        left.appendChild(document.createTextNode(ev.summary));
        var right = document.createElement('span');
        right.className = 'gh-time';
        right.textContent = timeAgo(ev.created_at);
        row.appendChild(left);
        row.appendChild(right);
        el.appendChild(row);
      });
    }

    function renderN8n(el, n8n) {
      clearEl(el);
      if (!n8n || (!n8n.recent || n8n.recent.length === 0)) {
        showMsg(el, 'No recent executions', 'empty-state');
        return;
      }
      var summary = document.createElement('div');
      summary.className = 'n8n-summary';
      var okItem = document.createElement('span');
      okItem.className = 'n8n-summary-item';
      var okDot = document.createElement('span');
      okDot.className = 'n8n-dot n8n-dot-ok';
      okItem.appendChild(okDot);
      okItem.appendChild(document.createTextNode(' ' + n8n.success_count + ' passed'));
      var errItem = document.createElement('span');
      errItem.className = 'n8n-summary-item';
      var errDot = document.createElement('span');
      errDot.className = 'n8n-dot n8n-dot-err';
      errItem.appendChild(errDot);
      errItem.appendChild(document.createTextNode(' ' + n8n.error_count + ' failed'));
      summary.appendChild(okItem);
      summary.appendChild(errItem);
      el.appendChild(summary);
      n8n.recent.forEach(function(ex) {
        var row = document.createElement('div');
        row.className = 'n8n-row';
        var wf = document.createElement('span');
        wf.className = 'n8n-wf';
        wf.textContent = ex.workflow;
        var badge = document.createElement('span');
        badge.className = 'n8n-status ' + (ex.status === 'success' ? 'n8n-success' : 'n8n-error');
        badge.textContent = ex.status;
        row.appendChild(wf);
        row.appendChild(badge);
        el.appendChild(row);
      });
    }

    function renderGmail(el, gmail) {
      clearEl(el);
      if (!gmail) { showMsg(el, 'No data', 'empty-state'); return; }
      if (gmail.messages && gmail.messages.length > 0) {
        gmail.messages.forEach(function(msg) {
          var row = document.createElement('div');
          row.className = 'task-row';
          var content = document.createElement('span');
          content.className = 'task-content';
          content.textContent = msg.subject;
          var meta = document.createElement('span');
          meta.className = 'task-meta';
          meta.textContent = msg.from;
          row.appendChild(content);
          row.appendChild(meta);
          el.appendChild(row);
        });
      } else {
        showMsg(el, gmail.unread_count > 0 ? gmail.unread_count + ' unread (loading details...)' : 'Inbox zero!', 'empty-state');
      }
    }

    function renderCalendar(el, calendar) {
      clearEl(el);
      if (!calendar || !calendar.events) {
        showMsg(el, 'No data', 'empty-state');
        return;
      }
      if (calendar.events.length === 0) {
        showMsg(el, 'No events today', 'empty-state');
        return;
      }
      calendar.events.forEach(function(ev) {
        var row = document.createElement('div');
        row.className = 'task-row';
        var content = document.createElement('span');
        content.className = 'task-content';
        content.textContent = ev.summary;
        var meta = document.createElement('span');
        meta.className = 'task-meta';
        if (ev.start && ev.start.indexOf('T') !== -1) {
          var t = ev.start.split('T')[1].substring(0, 5);
          var h = parseInt(t.split(':')[0]);
          var ampm = h >= 12 ? 'PM' : 'AM';
          h = h % 12 || 12;
          meta.textContent = h + ':' + t.split(':')[1] + ' ' + ampm;
        } else {
          meta.textContent = 'All day';
        }
        row.appendChild(content);
        row.appendChild(meta);
        el.appendChild(row);
      });
    }

    function renderHandoff(data) {
      var card = document.getElementById('handoffCard');
      var el = document.getElementById('handoffContent');
      if (!data || !data.session || !data.session.handoff) {
        card.style.display = 'none';
        return;
      }
      card.style.display = '';
      clearEl(el);
      var h = data.session.handoff;
      if (h.in_progress && h.in_progress.length) {
        el.appendChild(createHandoffSection('In Progress', h.in_progress));
      }
      if (h.next_steps && h.next_steps.length) {
        el.appendChild(createHandoffSection('Next Steps', h.next_steps));
      }
      if (h.decisions && h.decisions.length) {
        el.appendChild(createHandoffSection('Decisions Made', h.decisions));
      }
    }

    function updateStatus(data) {
      var el = document.getElementById('systemStatus');
      var sub = document.getElementById('statusSub');
      if (!data) {
        el.textContent = 'Offline';
        el.className = 'status-value error';
        sub.textContent = 'Could not reach n8n';
        return;
      }
      var diskPct = parseInt((data.vps && data.vps.disk_usage || '0').replace('%', '')) || 0;
      var memPct = (data.vps && data.vps.memory_pct) || 0;
      if (diskPct > 90 || memPct > 90) {
        el.textContent = 'Needs Attention';
        el.className = 'status-value warn';
      } else {
        el.textContent = 'All Systems Go';
        el.className = 'status-value ok';
      }
      var parts = [];
      parts.push((data.todoist ? data.todoist.due_count : 0) + ' due');
      parts.push((data.todoist ? data.todoist.completed_count : 0) + ' done');
      if (data.vps && data.vps.containers != null) parts.push(data.vps.containers + ' containers');
      sub.textContent = parts.join(' \u00b7 ');
    }

    function renderAll(data) {
      if (!data) { updateStatus(null); return; }
      updateStatus(data);
      document.getElementById('dueCount').textContent = data.todoist ? data.todoist.due_count : 0;
      document.getElementById('completedCount').textContent = data.todoist ? data.todoist.completed_count : 0;
      renderTasks(document.getElementById('dueTasks'), data.todoist ? data.todoist.due_today : [], false);
      renderTasks(document.getElementById('completedTasks'), data.todoist ? data.todoist.completed_today : [], true);
      renderVPS(document.getElementById('vpsHealth'), data.vps);
      document.getElementById('ghCount').textContent = data.github ? data.github.length : 0;
      renderGitHub(document.getElementById('githubActivity'), data.github);
      document.getElementById('n8nCount').textContent = data.n8n ? data.n8n.total : 0;
      renderN8n(document.getElementById('n8nExecs'), data.n8n);
      document.getElementById('gmailCount').textContent = data.gmail ? data.gmail.unread_count : 0;
      renderGmail(document.getElementById('gmailContent'), data.gmail);
      document.getElementById('calCount').textContent = data.calendar ? data.calendar.event_count : 0;
      renderCalendar(document.getElementById('calendarContent'), data.calendar);
      renderHandoff(data);

      var sysEl = document.getElementById('systemInfo');
      clearEl(sysEl);
      sysEl.appendChild(createStatRow('Last generated', data.generated_at_human || data.generated_at || 'Unknown', ''));
      if (data.session && data.session.last_session_end) {
        sysEl.appendChild(createStatRow('Last session ended', new Date(data.session.last_session_end).toLocaleString(), ''));
      }
      document.getElementById('lastUpdated').textContent = 'Updated ' + new Date().toLocaleTimeString();
    }

    async function loadData() {
      try {
        var res = await fetch(N8N_WEBHOOK, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: '{}'
        });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        lastData = await res.json();
        return lastData;
      } catch(e) {
        console.error('Failed to fetch status:', e);
        return null;
      }
    }

    async function refresh() {
      var btn = document.getElementById('refreshBtn');
      btn.classList.add('loading');
      btn.textContent = 'Refreshing...';
      var data = await loadData();
      renderAll(data);
      btn.classList.remove('loading');
      btn.textContent = 'Refresh';
    }

    async function init() {
      var data = await loadData();
      renderAll(data);
    }

    init();
    setInterval(function() { loadData().then(renderAll); }, 300000);
  </script>
</body>
</html>
